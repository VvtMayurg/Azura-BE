services:
  docs:
    image: azura_be_local_docs
    container_name: azura_be_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./azura_be:/app/azura_be:z
    ports:
      - '9000:9000'
    command: /start-docs
